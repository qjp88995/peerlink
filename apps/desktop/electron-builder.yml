appId: com.qinjiapeng.peerlink
productName: PeerLink
# 显式可执行名：默认会取包名 @peerlink/desktop，含非法字符 @ 导致 Linux AppImage 构建失败。
executableName: PeerLink
directories:
  output: release
files:
  - dist/**
  - package.json
# dist/renderer 由 build.mjs 拷入，已被 dist/** 覆盖
mac:
  target:
    - target: dmg
      arch: [universal]
  category: public.app-category.social-networking
  icon: resources/icon.png
win:
  target:
    # portable = 单个自包含 .exe，双击即运行、无需安装（直接执行用这个）
    - target: portable
      arch: [x64]
    # nsis = 带向导的安装包（可选，安装到系统）
    - target: nsis
      arch: [x64]
  icon: resources/icon.png
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - AppImage
    - deb
  category: Network
  icon: resources/icon.png
  # .deb 必须有 maintainer；package.json 的 author 未带邮箱，这里显式给出。
  maintainer: qjp88995 <qjp88995@users.noreply.github.com>
