appId: com.qinjiapeng.peerlink
productName: PeerLink
directories:
  output: release
files:
  - dist/**
  - package.json
# dist/renderer 由 build.mjs 拷入，已被 dist/** 覆盖
mac:
  target:
    - target: dmg
      arch: [universal]
  category: public.app-category.social-networking
  icon: resources/icon.png
win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.png
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - AppImage
    - deb
  category: Network
  icon: resources/icon.png
