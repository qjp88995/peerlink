name: Desktop Release

on:
  push:
    tags: ['v*.*.*']
  # 手动触发：无需打 tag，构建产物作为 artifact 上传供下载（不创建 Release，
  # 也不会触发 docker 镜像发布工作流）。
  workflow_dispatch:

jobs:
  build:
    # 创建 GitHub Release 需要写 contents，默认 GITHUB_TOKEN 只读会 403。
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @peerlink/web build
      - run: pnpm --filter @peerlink/desktop build
      - run: pnpm --filter @peerlink/desktop exec electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # 每次运行都把安装包/可执行文件作为 artifact 上传（手动触发也能下载）。
      - uses: actions/upload-artifact@v4
        with:
          name: peerlink-${{ matrix.os }}
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.dmg
          if-no-files-found: ignore
      # 仅打 tag 时额外创建 GitHub Release 并挂载产物。
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: apps/desktop/release/*.{AppImage,deb,dmg,exe}
