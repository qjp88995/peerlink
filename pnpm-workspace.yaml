packages:
  - 'apps/*'
  - 'packages/*'

onlyBuiltDependencies:
  - esbuild
  - '@tailwindcss/oxide'

catalog:
  # ─── Runtime ───
  zod: '^4.4.1'
  ws: '^8.18.0'
  pino: '^10.3.1'
  pino-pretty: '^13.1.3'

  # ─── Frontend ───
  react: '^19.2.5'
  react-dom: '^19.2.5'
  '@tanstack/react-router': '^1.168.26'
  '@tanstack/router-plugin': '^1.167.29'
  zustand: '^5.0.12'
  sonner: '^2.0.7'
  lucide-react: '^1.14.0'
  clsx: '^2.1.1'
  tailwind-merge: '^3.5.0'
  qrcode: '^1.5.4'
  '@zip.js/zip.js': '^2.7.52'

  # ─── Build / Vite ───
  vite: '^8.0.10'
  '@vitejs/plugin-react': '^6.0.1'
  '@tailwindcss/vite': '^4.2.4'
  tailwindcss: '^4.2.4'

  # ─── Lint / Format ───
  '@eslint/js': '^10.0.1'
  eslint: '^10.2.1'
  eslint-plugin-react-hooks: '^7.1.1'
  eslint-plugin-react-refresh: '^0.5.2'
  eslint-plugin-simple-import-sort: '^13.0.0'
  globals: '^17.5.0'
  prettier: '^3.8.3'
  typescript: '^5.9.3'
  typescript-eslint: '^8.59.1'

  # ─── Types ───
  '@types/node': '^25.6.0'
  '@types/react': '^19.2.0'
  '@types/react-dom': '^19.2.0'
  '@types/ws': '^8.5.13'
  '@types/qrcode': '^1.5.5'

  # ─── Test ───
  vitest: '^4.1.5'
  '@playwright/test': '^1.49.0'
