# ─────────────────────────────────────────────────────────────
# 本地开发 compose。所有 app 跑在容器内，Traefik 统一反代。
# 宿主只暴露 Traefik 端口（见 docker-compose.override.yml）。
#
# 路由（计划 2/3 接入 app 服务后生效）：
#   http://localhost:${TRAEFIK_PORT}/        → web:5173 (Vite)
#   http://localhost:${TRAEFIK_PORT}/signal  → signaling (WebSocket)
#
# 生产部署不在此文件范围。
# ─────────────────────────────────────────────────────────────

x-app-build: &app-build
  build:
    context: .
    dockerfile: docker/Dockerfile.dev
    args:
      UID: ${UID:-1000}
      GID: ${GID:-1000}
  image: peerlink-dev:latest

services:
  # 一次性安装依赖；app 服务启动前完成。
  deps:
    <<: *app-build
    # CI=true 让 pnpm 在无 TTY 的容器里跳过 node_modules 清理交互提示。
    environment:
      CI: 'true'
    # node_modules/lockfile 已 bind-mount 进来，离线安装即可（容器内通常连不上 registry）。
    command: pnpm install --frozen-lockfile --prefer-offline
    volumes:
      - ./:/workspace
    networks:
      - internal

  traefik:
    image: traefik:latest
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=peerlink_internal
      # 只认本 compose 项目的容器，避免读到宿主上其它项目（smart-property 等）
      # 的 Traefik 标签，防止面板混入 /admin 等路由、以及 PathPrefix `/` 撞车。
      - --providers.docker.constraints=Label(`com.docker.compose.project`,`peerlink`)
      - --entrypoints.web.address=:80
      - --api.insecure=true
      - --api.dashboard=true
      - --log.level=INFO
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal
    # 宿主端口映射在 docker-compose.override.yml。

  # ─── 计划 2 加入 signaling 服务 ───
  signaling:
    <<: *app-build
    restart: unless-stopped
    depends_on:
      deps:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      SIGNALING_PORT: 3001
      SIGNALING_PATH: /signal
      LOG_LEVEL: ${LOG_LEVEL:-info}
    command: pnpm --filter @peerlink/signaling dev
    volumes:
      - ./:/workspace
    networks:
      - internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=peerlink_internal
      - traefik.http.routers.pl-signal.rule=PathPrefix(`/signal`)
      - traefik.http.routers.pl-signal.entrypoints=web
      - traefik.http.routers.pl-signal.priority=10
      - traefik.http.services.pl-signal.loadbalancer.server.port=3001

  # ─── 桌面版（apps/desktop）开发壳 ───
  # 默认不启动（profile=desktop），需要时显式拉起：
  #   docker compose --profile desktop up desktop
  # 容器内自带一套 vite（同容器 localhost:5173，HMR 同源正常）+ esbuild watch
  # + electron，GUI 经挂载的 WSLg socket 显示到真实 WSL / Windows 桌面。
  # electron 主进程日志 `docker compose logs -f desktop` 读取，便于容器内调试。
  # 屏幕共享 / 托盘等与合成器相关的能力需真机复核（见计划 Task 9）。
  #
  # 重要：docker daemon 跑在真实 WSL（非编排器所在的沙箱），下列挂载路径与
  # ${DISPLAY} 等变量均由真实 WSL 解析/继承。按标准 WSLg 布局配置；若真机
  # WSLg 路径不同，覆盖对应变量（建议放 .env）。
  desktop:
    <<: *app-build
    profiles:
      - desktop
    depends_on:
      deps:
        condition: service_completed_successfully
      signaling:
        condition: service_started
    # 注意：不设 RUNNING_IN_DOCKER，让容器内 electron 直连同容器 vite 时
    # 走同源 HMR（避免 web 服务那套 clientPort=8894 的反代 HMR 设置）。
    environment:
      # WSLg GUI 转发：从真实 WSL 继承，给出标准默认值。
      DISPLAY: ${DISPLAY:-:0}
      WAYLAND_DISPLAY: ${WAYLAND_DISPLAY:-wayland-0}
      XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR:-/mnt/wslg/runtime-dir}
      # 音频（来电振铃 / 提示音）走 WSLg 的 PulseAudio。
      PULSE_SERVER: ${PULSE_SERVER:-/mnt/wslg/PulseServer}
      # 容器内无 setuid sandbox，禁用之（仅 dev 容器，安全姿势不变）。
      ELECTRON_DISABLE_SANDBOX: '1'
      # 容器内通常无硬件 GL，强制软件渲染避免 electron 崩溃 / 黑屏。
      LIBGL_ALWAYS_SOFTWARE: '1'
    command: pnpm --filter @peerlink/desktop dev
    volumes:
      - ./:/workspace
      # WSLg：X11 socket + wayland/音频运行时目录，透传真实 WSL 的 socket。
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /mnt/wslg:/mnt/wslg
    networks:
      - internal

  # ─── 计划 3 加入 web 服务 ───
  web:
    <<: *app-build
    restart: unless-stopped
    depends_on:
      deps:
        condition: service_completed_successfully
      signaling:
        condition: service_started
    environment:
      RUNNING_IN_DOCKER: '1'
      TRAEFIK_PORT: ${TRAEFIK_PORT:-8894}
    command: pnpm --filter @peerlink/web dev
    volumes:
      - ./:/workspace
    networks:
      - internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=peerlink_internal
      - traefik.http.routers.pl-web.rule=PathPrefix(`/`)
      - traefik.http.routers.pl-web.entrypoints=web
      - traefik.http.routers.pl-web.priority=1
      - traefik.http.services.pl-web.loadbalancer.server.port=5173

networks:
  internal:
    name: peerlink_internal
    driver: bridge
